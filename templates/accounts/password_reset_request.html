{% extends 'base.html' %}

{% block title %}Reset Password - Expense Tracker{% endblock %}

{% block content_noauth %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.85rem">Enter your email and we'll send you
            a reset link.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Send
                Reset Link</button>
        </form>
        <div style="text-align:center;margin-top:16px;font-size:0.85rem">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
