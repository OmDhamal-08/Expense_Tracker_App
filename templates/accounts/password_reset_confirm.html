{% extends 'base.html' %}

{% block title %}Set New Password - Expense Tracker{% endblock %}

{% block content_noauth %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Set New Password</h1>
        {% if validlink %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="new_password1">New Password</label>
                <input type="password" class="form-control" id="new_password1" name="new_password1" required>
            </div>
            <div class="form-group">
                <label for="new_password2">Confirm New Password</label>
                <input type="password" class="form-control" id="new_password2" name="new_password2" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Reset
                Password</button>
        </form>
        {% else %}
        <div class="alert alert-danger">This password reset link is invalid or has expired.</div>
        <div style="text-align:center">
            <a href="{% url 'password_reset' %}" class="btn btn-primary">Request New Link</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
