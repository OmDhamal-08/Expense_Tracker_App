{% extends 'base.html' %}
{% block title %}Setup Two-Factor Authentication{% endblock %}
{% block page_title %}Setup 2FA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-body text-center p-5">
                <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3">Enable 2FA</h3>
                <p class="text-muted">Scan this QR code with your authenticator app (e.g., Google Authenticator, Authy).</p>
                
                <div class="bg-light p-3 rounded mb-4 d-inline-block">
                    <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code" class="img-fluid" style="max-width: 250px;">
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="form-group mb-3 text-start">
                        <label for="token">Enter the 6-digit code from your app:</label>
                        <input type="text" name="token" id="token" class="form-control form-control-lg text-center" placeholder="123456" required autocomplete="off" autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Verify and Enable</button>
                    <a href="{% url 'profile' %}" class="btn btn-link mt-2 text-decoration-none">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
