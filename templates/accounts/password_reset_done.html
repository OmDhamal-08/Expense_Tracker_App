{% extends 'base.html' %}

{% block title %}Password Reset Sent - Expense Tracker{% endblock %}

{% block content_noauth %}
<div class="auth-page">
    <div class="auth-card" style="text-align:center">
        <i class="fas fa-envelope-open" style="font-size:2rem;color:var(--accent);margin-bottom:16px"></i>
        <h1>Check Your Email</h1>
        <p style="color:var(--text-secondary);margin-bottom:20px;font-size:0.85rem">
            If an account exists with that email address, we've sent a password reset link. Check your inbox.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
    </div>
</div>
{% endblock %}
