<form id="quickAddForm" method="post" action="{% url 'quick_add_expense' %}">
    {% csrf_token %}
    <div class="row align-items-end">
        <div class="col-md-2 mb-2">
            <label class="form-label">Amount*</label>
            {{ form.amount }}
        </div>
        <div class="col-md-3 mb-2">
            <label class="form-label">Category*</label>
            {{ form.category }}
        </div>
        <div class="col-md-3 mb-2">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" value="{% now 'Y-m-d' %}" required>
        </div>
        <div class="col-md-3 mb-2">
            <label class="form-label">Tags</label>
            <input type="text" name="tags" class="form-control" placeholder="comma-separated">
        </div>
        <div class="col-md-1 mb-2">
            <button type="submit" class="btn btn-primary w-100 h-100"><i class="bi bi-plus"></i></button>
            <div style="display:none;">
                <!-- Hidden essential fields with mock data so form validation passes -->
                <input type="time" name="time" value="00:00">
                <input type="hidden" name="payment_method" value="">
            </div>
        </div>
    </div>
    <div id="quickAddError" class="text-danger small mt-2" style="display:none;"></div>
    <div id="quickAddSuccess" class="text-success small mt-2" style="display:none;"></div>
</form>

<script>
    document.getElementById('quickAddForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const form = this;
        const errDiv = document.getElementById('quickAddError');
        const sucDiv = document.getElementById('quickAddSuccess');
        
        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                sucDiv.textContent = data.message;
                sucDiv.style.display = 'block';
                errDiv.style.display = 'none';
                form.reset();
                setTimeout(() => location.reload(), 1000); // Reload to reflect changes
            } else {
                errDiv.textContent = 'Please check the entered values. Ensure all required fields (Amount, Category) are filled out correctly.';
                errDiv.style.display = 'block';
                sucDiv.style.display = 'none';
            }
        })
        .catch(error => console.error('Error:', error));
    });
</script>
