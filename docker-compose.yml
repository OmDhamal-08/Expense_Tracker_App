version: '3.9'
# #21 Local PostgreSQL environment for development
# Usage:
#   docker-compose up -d          (start postgres container)
#   Add DATABASE_URL=postgresql://expense_user:expense_pass@localhost:5432/expense_db to .env
#   python manage.py migrate

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Optional: pgAdmin web UI at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@expense.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pg_data:
